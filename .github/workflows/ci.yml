name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  tests:
    name: Tests (benchmark methodology + retrieval-metric logic)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: pip install -e ".[dev]"   # [dev] carries pytest + pytest-asyncio
      # The benchmark suite is offline + key-free (the real-API tests skip
      # without credentials). It proves the harness + retrieval-metric logic.
      - name: Run benchmark tests
        run: PYTHONPATH=. pytest tests/benchmarks/ -q

  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with: { python-version: "3.12" }
      - run: pip install ruff
      - name: Ruff (retrieval engine + benchmark harness)
        run: ruff check benchmarks/b7_ab_infra.py benchmarks/b7_stats.py benchmarks/b9_rag.py benchmarks/b9_rag_stats.py benchmarks/b9_rag_runner.py core/effort_triage.py
