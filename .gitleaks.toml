# gitleaks config — allowlists known false positives from the
# generic-api-key regex hitting docs and binary blobs.

title = "bert-lab gitleaks config"

[extend]
useDefault = true

[allowlist]
description = "Known-false-positive paths + lines"
paths = [
    # Phase 1 CanvasAgent's Electron release assets — compiled
    # resources.pak / .pak.info files are binary blobs that the
    # generic-api-key regex matches on by accident.
    '''phase1/canvasagent/release/.*''',
    # Pre-existing benchmark fixtures with intentional fake keys
    '''benchmarks/.*\.json$''',
    # Findings doc reference list shape isn't a secret
    '''findings/architecture/01_overview\.md$''',
    # Runtime lab state — bm25 inverted indexes, memory caches,
    # event logs. Not source, just runtime artifacts.
    '''lab/state/.*''',
    '''.*\.pyc$''',
]
regexes = [
    # Fake / placeholder keys used in examples
    '''gsk_[Xx]{20,}''',
    '''sk-[Xx]{20,}''',
    '''AIza[Xx]{20,}''',
]
