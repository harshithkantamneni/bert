# Model capability cards — bert v1.0 (May 2026 snapshot)
#
# Sprint 1 commit 9: the canonical registry of every model bert can
# route to. Each card declares: where it's accessible (host / BYO /
# free-tier), context/output limits, thinking-token + prompt-caching
# support, pricing (USD per million tokens), empirical strengths and
# weaknesses (tagged), best/avoid for roles + skills, published
# benchmarks at card-authoring time, and a last_validated date.
#
# Used by:
#   - core/router.py:resolve_model_for_dispatch (model selection)
#   - core/host_detector (tier-1 availability filtering)
#   - bert doctor (display per-tier model availability)
#   - tools/refresh_model_cards.py (daily registry refresh)
#
# Schema validated by core/model_cards.py loader; deprecation_date
# triggers a 7-day warning before retirement (#39). Pair it with
# `deprecated_to: <successor model id>` so the router transparently
# remaps a past-date model to its successor (#32 graceful aliases) —
# the daily refresh (#31) sets both when a provider deprecates a model.

cards:

